<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Yellow Shoes — Let's combine things</title>
    <meta name="description" content="Snap a photo of any fashion item and get instant AI styling suggestions.">
    <meta name="theme-color" content="#111111">
    <meta property="og:title" content="Yellow Shoes">
    <meta property="og:description" content="Snap a photo of any fashion item and get instant AI styling suggestions.">
    <meta property="og:type" content="website">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-black': '#111111',
                        'brand-ink': '#1c1c1f',
                        'brand-yellow': '#FFD400',
                        'brand-yellow-hover': '#EAC200',
                    }
                }
            }
        }
    </script>
    <!-- React (loaded before the app module so the globals are guaranteed available) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .blur-content { filter: blur(8px); pointer-events: none; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .skeleton { position: relative; overflow: hidden; background: #ececef; }
        .skeleton::after {
            content: '';
            position: absolute;
            inset: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shimmer 1.4s infinite;
        }
        @media (prefers-reduced-motion: reduce) {
            .animate-spin, .skeleton::after { animation: none; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-yellow-50 via-white to-white">
    <div id="app"></div>

    <script type="module">
        const { createElement: h, useState, useRef } = React;
        const ReactDOM = window.ReactDOM;

        // Anthropic recommends a max image edge of ~1568px. Re-encoding to JPEG
        // keeps phone photos well under Vercel's ~4.5MB request limit.
        const MAX_IMAGE_DIM = 1568;
        const JPEG_QUALITY = 0.85;

        // ---- Affiliate configuration ----
        // The AI returns a generic search query per item (in the user's language);
        // we show up to 3 affiliate stores chosen by the visitor's country.
        // Links work right away (they open the store's search). To MONETIZE, enroll
        // in each program/network and fill in the IDs in AFFILIATE_SETTINGS / BRANDS
        // below — no other code changes are needed.
        const e = encodeURIComponent;

        const AFFILIATE_SETTINGS = {
            awinAffId: '',   // your Awin publisher id, e.g. '1234567' (used by brands that have an awinMid)
            amazonTag: '',   // your Amazon Associates tag, e.g. 'yellowshoes-20'
        };

        // Each brand: how to search its store + (optional) how to monetize the link.
        const BRANDS = {
            mango:     { label: 'Mango',     search: q => `https://shop.mango.com/search?q=${e(q)}`, awinMid: '' },
            zara:      { label: 'Zara',      search: q => `https://www.zara.com/search?searchTerm=${e(q)}` }, // Zara has no affiliate program — direct link
            parfois:   { label: 'Parfois',   search: q => `https://www.parfois.com/catalogsearch/result/?q=${e(q)}` },
            farfetch:  { label: 'Farfetch',  search: q => `https://www.farfetch.com/shopping/search/items.aspx?q=${e(q)}`, awinMid: '' },
            asos:      { label: 'ASOS',      search: q => `https://www.asos.com/search/?q=${e(q)}`, awinMid: '' },
            hm:        { label: 'H&M',       search: q => `https://www2.hm.com/en/search-results.html?q=${e(q)}` },
            zalando:   { label: 'Zalando',   search: q => `https://www.zalando.com/catalog/?q=${e(q)}`, awinMid: '' },
            dafiti:    { label: 'Dafiti',    search: q => `https://www.dafiti.com.br/catalog/?q=${e(q)}`, awinMid: '' },
            amaro:     { label: 'Amaro',     search: q => `https://amaro.com/busca?q=${e(q)}` },
            renner:    { label: 'Renner',    search: q => `https://www.lojasrenner.com.br/busca?q=${e(q)}` },
            nordstrom: { label: 'Nordstrom', search: q => `https://www.nordstrom.com/sr?keyword=${e(q)}` },
            amazon:    { label: 'Amazon',    search: q => `https://www.amazon.com/s?k=${e(q)}&i=fashion`, amazon: true },
        };

        // Up to the first 3 brands are shown per country. Edit freely.
        const AFFILIATES_BY_COUNTRY = {
            PT: ['mango', 'farfetch', 'parfois'],
            ES: ['mango', 'zara', 'farfetch'],
            FR: ['zalando', 'mango', 'farfetch'],
            IT: ['zalando', 'mango', 'farfetch'],
            DE: ['zalando', 'mango', 'asos'],
            GB: ['asos', 'farfetch', 'hm'],
            US: ['nordstrom', 'asos', 'amazon'],
            BR: ['dafiti', 'farfetch', 'amaro'],
        };
        const DEFAULT_AFFILIATES = ['farfetch', 'asos', 'mango'];

        // Button verb per UI language ("Ver na Mango", "Shop on Mango"...).
        const SHOP_VERB = {
            'English': 'Shop on',
            'Portuguese (Portugal)': 'Ver na',
            'Portuguese (Brazil)': 'Ver na',
            'French': 'Voir sur',
            'Italian': 'Vedi su',
            'German': 'Bei',
        };

        function resolveCountry(suggestions, language) {
            const fromApi = suggestions && suggestions.country ? String(suggestions.country).toUpperCase() : '';
            if (fromApi) return fromApi;
            // Fallback when geolocation is unavailable (e.g. local dev): guess from language.
            if (language === 'Portuguese (Brazil)') return 'BR';
            if (language === 'Portuguese (Portugal)') return 'PT';
            if (language === 'French') return 'FR';
            if (language === 'Italian') return 'IT';
            if (language === 'German') return 'DE';
            return 'DEFAULT';
        }
        function affiliatesForCountry(code) {
            return (AFFILIATES_BY_COUNTRY[code] || DEFAULT_AFFILIATES).slice(0, 3);
        }
        function buildAffiliateUrl(brandKey, query) {
            const b = BRANDS[brandKey];
            if (!b) return '#';
            const dest = b.search(query);
            if (b.awinMid && AFFILIATE_SETTINGS.awinAffId) {
                return `https://www.awin1.com/cread.php?awinmid=${b.awinMid}&awinaffid=${AFFILIATE_SETTINGS.awinAffId}&ued=${e(dest)}`;
            }
            if (b.amazon && AFFILIATE_SETTINGS.amazonTag) {
                return dest + (dest.indexOf('?') >= 0 ? '&' : '?') + 'tag=' + e(AFFILIATE_SETTINGS.amazonTag);
            }
            return dest; // plain store search — works now, monetizes once IDs are set
        }

        // ----- Icons -----
        const CameraIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h('path', { d: "M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" }),
            h('circle', { cx: 12, cy: 13, r: 3 })
        );

        const UploadIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h('path', { d: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" }),
            h('polyline', { points: "17 8 12 3 7 8" }),
            h('line', { x1: 12, x2: 12, y1: 3, y2: 15 })
        );

        const SparklesIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h('path', { d: "m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" }),
            h('path', { d: "M5 3v4" }), h('path', { d: "M19 17v4" }), h('path', { d: "M3 5h4" }), h('path', { d: "M17 19h4" })
        );

        // Yellow Shoes logo — a side-profile sneaker (white upper + yellow sole),
        // designed to sit on the dark header.
        const YellowShoesLogo = () => h('svg', { width: 36, height: 36, viewBox: "0 0 48 32", fill: "none", xmlns: "http://www.w3.org/2000/svg", 'aria-hidden': true },
            // sole
            h('path', { d: "M4 23 L44 23 C45.1 23 45.8 23.7 45.6 24.7 C45.1 27.4 42.6 29 39 29 L11 29 C7.4 29 4.9 27.4 4.4 24.7 C4.2 23.7 3 23 4 23 Z", fill: '#FFD400' }),
            // upper
            h('path', { d: "M7 23 L7 15.4 C7 12.9 9 11.9 11 11.5 L23 9 C25.6 8.5 27.6 9.6 28.6 11.6 L31.6 17 C32.6 19 34.1 20 36 20.2 L41 21 C43.6 21.3 44 22 44 23 Z", fill: '#FFFFFF' }),
            // lace accents
            h('path', { d: "M12 15 L16.6 14 M13.6 18 L18.2 17 M15.2 21 L19.8 20", stroke: '#111111', strokeWidth: 1.4, strokeLinecap: "round" })
        );

        const RefreshIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h('path', { d: "M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" }),
            h('path', { d: "M21 3v5h-5" }),
            h('path', { d: "M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" }),
            h('path', { d: "M3 21v-5h5" })
        );

        const GlobeIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", 'aria-hidden': true },
            h('circle', { cx: 12, cy: 12, r: 10 }),
            h('path', { d: "M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" }),
            h('path', { d: "M2 12h20" })
        );

        const XIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h('path', { d: "M18 6 6 18" }), h('path', { d: "m6 6 12 12" })
        );

        const AlertIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 20, height: 20, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h('circle', { cx: 12, cy: 12, r: 10 }),
            h('line', { x1: 12, x2: 12, y1: 8, y2: 12 }),
            h('line', { x1: 12, x2: 12.01, y1: 16, y2: 16 })
        );

        const BagIcon = () => h('svg', { xmlns: "http://www.w3.org/2000/svg", width: 16, height: 16, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round", 'aria-hidden': true },
            h('path', { d: "M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" }),
            h('path', { d: "M3 6h18" }),
            h('path', { d: "M16 10a4 4 0 0 1-8 0" })
        );

        const LoaderIcon = () => h('svg', { className: "animate-spin", xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h('path', { d: "M21 12a9 9 0 1 1-6.219-8.56" })
        );

        // ----- Image helpers -----
        function compressImage(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    let { width, height } = img;
                    const longest = Math.max(width, height);
                    if (longest > MAX_IMAGE_DIM) {
                        const scale = MAX_IMAGE_DIM / longest;
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', JPEG_QUALITY));
                    } catch (e) {
                        resolve(dataUrl);
                    }
                };
                img.onerror = () => resolve(dataUrl);
                img.src = dataUrl;
            });
        }

        function SkeletonCard() {
            return h('div', { className: "bg-white rounded-2xl shadow-lg p-6 space-y-3 border border-neutral-100" },
                h('div', { className: "skeleton h-5 w-1/3 rounded" }),
                h('div', { className: "skeleton h-4 w-full rounded" }),
                h('div', { className: "skeleton h-4 w-5/6 rounded" }),
                h('div', { className: "skeleton h-4 w-2/3 rounded" })
            );
        }

        // Affiliate buttons for a single item: up to 3 country-appropriate stores.
        function ShopButtons({ query, brands, lang }) {
            if (!query || !brands || brands.length === 0) return null;
            const verb = SHOP_VERB[lang] || SHOP_VERB.English;
            return h('div', { className: "flex flex-wrap gap-2 mt-2" },
                ...brands.map((key) => {
                    const b = BRANDS[key];
                    if (!b) return null;
                    return h('a', {
                        key: key,
                        href: buildAffiliateUrl(key, query),
                        target: "_blank",
                        rel: "sponsored noopener noreferrer",
                        className: "inline-flex items-center gap-1 px-2.5 py-1.5 rounded-lg text-xs font-medium border border-brand-black/15 bg-white text-brand-black hover:bg-yellow-50 hover:border-brand-yellow transition-colors"
                    }, h(BagIcon), `${verb} ${b.label}`);
                })
            );
        }

        function ErrorBox({ message }) {
            return h('div', { className: "bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex gap-3 items-start" },
                h('div', { className: "mt-0.5 shrink-0" }, h(AlertIcon)),
                h('div', {},
                    h('p', { className: "font-semibold" }, 'Something went wrong'),
                    h('p', { className: "text-sm" }, message)
                )
            );
        }

        function FashionStylist() {
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [suggestions, setSuggestions] = useState(null);
            const [error, setError] = useState(null);
            const [showStyleSelector, setShowStyleSelector] = useState(false);
            const [selectedStyle, setSelectedStyle] = useState('');
            const [selectedSeason, setSelectedSeason] = useState('');
            const [selectedLanguage, setSelectedLanguage] = useState('English');
            const [isRefinedSuggestion, setIsRefinedSuggestion] = useState(false);
            const [preparing, setPreparing] = useState(false);
            const fileInputRef = useRef(null);
            const cameraInputRef = useRef(null);

            const styles = ['Boho', 'Casual', 'Chic', 'Elegant', 'Hippie', 'Minimalist', 'Old money', 'Sporty', 'Streetwear', 'Vintage'];
            const seasons = ['Spring', 'Summer', 'Autumn', 'Winter'];
            const languages = ['English', 'Portuguese (Portugal)', 'Portuguese (Brazil)', 'French', 'Italian', 'German'];

            const handleImageUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setPreparing(true);
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const compressed = await compressImage(e.target.result);
                    setImage(compressed);
                    setSuggestions(null);
                    setError(null);
                    setShowStyleSelector(false);
                    setPreparing(false);
                };
                reader.onerror = () => {
                    setError('Could not read that file. Please try another image.');
                    setPreparing(false);
                };
                reader.readAsDataURL(file);
            };

            const analyzeFashionItem = async (style = null, season = null) => {
                if (!image) return;
                setLoading(true);
                setError(null);
                setShowStyleSelector(false);
                setIsRefinedSuggestion(Boolean(style && season));

                try {
                    const base64Data = image.split(',')[1];
                    const response = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            imageData: base64Data,
                            mediaType: "image/jpeg",
                            style: style,
                            season: season,
                            language: selectedLanguage
                        })
                    });

                    if (!response.ok) {
                        let message = `Request failed (${response.status}).`;
                        try {
                            const errorData = await response.json();
                            if (errorData && errorData.error) message = errorData.error;
                        } catch (_) { /* keep default */ }
                        throw new Error(message);
                    }

                    const data = await response.json();
                    setSuggestions(data);
                } catch (err) {
                    console.error('Error:', err);
                    const friendly = /failed to fetch|networkerror|load failed/i.test(err.message || '')
                        ? 'Could not reach the server. Check your connection and try again.'
                        : (err.message || 'Something went wrong. Please try again.');
                    setError(friendly);
                } finally {
                    setLoading(false);
                }
            };

            const handleRefreshClick = () => {
                setShowStyleSelector(true);
                setSelectedStyle('');
                setSelectedSeason('');
            };

            const handleGenerateWithPreferences = () => {
                if (selectedStyle && selectedSeason) analyzeFashionItem(selectedStyle, selectedSeason);
            };

            const reset = () => {
                setImage(null); setSuggestions(null); setLoading(false); setError(null);
                setShowStyleSelector(false); setSelectedStyle(''); setSelectedSeason(''); setIsRefinedSuggestion(false);
            };

            const primaryBtn = "w-full bg-brand-yellow text-brand-black py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-brand-yellow-hover transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed";
            const secondaryBtn = "w-full bg-white border-2 border-brand-black text-brand-black py-4 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-yellow-50 transition-all disabled:opacity-50 disabled:cursor-not-allowed";
            const shopBrands = affiliatesForCountry(resolveCountry(suggestions, selectedLanguage));

            return h('div', { className: "min-h-screen flex flex-col" },
                // Header
                h('header', { className: "bg-brand-black text-white shadow-md sticky top-0 z-10" },
                    h('div', { className: "max-w-2xl mx-auto px-4 py-4" },
                        h('div', { className: "flex items-center justify-between" },
                            h('div', { className: "flex items-center gap-3" },
                                h(YellowShoesLogo),
                                h('div', {},
                                    h('h1', { className: "text-2xl font-extrabold tracking-tight leading-none" },
                                        h('span', { className: "text-brand-yellow" }, 'Yellow'), ' Shoes'
                                    ),
                                    h('p', { className: "text-xs text-neutral-400 mt-0.5" }, "Let's combine things")
                                )
                            ),
                            h('div', { className: "flex items-center gap-3" },
                                h('div', { className: "relative" },
                                    h('label', { htmlFor: "lang", className: "sr-only" }, 'Language'),
                                    h('select', {
                                        id: "lang",
                                        value: selectedLanguage,
                                        onChange: (e) => setSelectedLanguage(e.target.value),
                                        className: "appearance-none bg-white/10 text-white text-sm font-medium pl-8 pr-3 py-2 rounded-lg border border-white/20 focus:outline-none focus:border-brand-yellow cursor-pointer"
                                    },
                                        ...languages.map(lang => h('option', { key: lang, value: lang, className: "text-black" }, lang))
                                    ),
                                    h('div', { className: "absolute left-2 top-1/2 transform -translate-y-1/2 pointer-events-none text-white" },
                                        h(GlobeIcon)
                                    )
                                ),
                                image && h('button', { onClick: reset, 'aria-label': "Start over", className: "text-white/70 hover:text-white transition-colors" }, h(XIcon))
                            )
                        )
                    )
                ),

                // Main content
                h('main', { className: "flex-1 w-full max-w-2xl mx-auto px-4 py-6" },
                    !image ?
                        // Upload section
                        h('div', { className: "space-y-4" },
                            h('div', { className: "bg-white rounded-2xl shadow-lg p-8 text-center border border-neutral-100" },
                                h('div', { className: "mb-6" },
                                    h('div', { className: "w-20 h-20 mx-auto bg-brand-yellow rounded-full flex items-center justify-center mb-4 text-brand-black shadow-sm" },
                                        h(SparklesIcon)
                                    ),
                                    h('h2', { className: "text-2xl font-bold text-brand-black mb-2" }, 'Style Your Look'),
                                    h('p', { className: "text-neutral-600" }, 'Take a photo of any fashion item and get instant styling suggestions')
                                ),
                                h('div', { className: "space-y-3" },
                                    h('input', { type: "file", ref: cameraInputRef, onChange: handleImageUpload, accept: "image/*", capture: "environment", className: "hidden" }),
                                    h('button', { onClick: () => cameraInputRef.current?.click(), disabled: preparing, className: primaryBtn },
                                        preparing ? [h(LoaderIcon, { key: 'l' }), 'Preparing…'] : [h(CameraIcon, { key: 'c' }), 'Take Photo']
                                    ),
                                    h('input', { type: "file", ref: fileInputRef, onChange: handleImageUpload, accept: "image/*", className: "hidden" }),
                                    h('button', { onClick: () => fileInputRef.current?.click(), disabled: preparing, className: secondaryBtn },
                                        h(UploadIcon), 'Upload from Gallery'
                                    )
                                )
                            ),
                            error && h(ErrorBox, { message: error })
                        )
                    : !suggestions && !showStyleSelector ?
                        // Image preview & analyze
                        h('div', { className: "space-y-4" },
                            h('div', { className: "bg-white rounded-2xl shadow-lg overflow-hidden border border-neutral-100" },
                                h('img', { src: image, alt: "Fashion item to be styled", className: "w-full max-h-96 object-contain bg-neutral-50" })
                            ),
                            error && h(ErrorBox, { message: error }),
                            loading
                                ? h('div', { className: "space-y-4" },
                                    h('div', { className: "flex items-center justify-center gap-3 text-brand-black py-2" },
                                        h(LoaderIcon), h('span', { className: "font-semibold" }, 'Analyzing your item…')
                                    ),
                                    h(SkeletonCard), h(SkeletonCard)
                                )
                                : h('button', { onClick: () => analyzeFashionItem(), disabled: loading, className: primaryBtn },
                                    h(SparklesIcon), 'Get Style Suggestions'
                                )
                        )
                    : showStyleSelector ?
                        // Style & Season selector
                        h('div', { className: "space-y-4" },
                            h('div', { className: "bg-white rounded-2xl shadow-lg overflow-hidden border border-neutral-100" },
                                h('img', { src: image, alt: "Fashion item", className: "w-full h-48 object-contain bg-neutral-50" })
                            ),
                            h('div', { className: "bg-white rounded-2xl shadow-lg p-6 border border-neutral-100" },
                                h('h3', { className: "text-xl font-bold text-brand-black mb-4" }, 'Choose Your Style'),
                                h('div', { className: "grid grid-cols-2 gap-2 mb-6" },
                                    ...styles.map(style =>
                                        h('button', {
                                            key: style,
                                            onClick: () => setSelectedStyle(style),
                                            className: `py-3 px-4 rounded-lg font-medium transition-all ${
                                                selectedStyle === style
                                                    ? 'bg-brand-black text-white shadow-lg'
                                                    : 'bg-neutral-100 text-neutral-700 hover:bg-neutral-200'
                                            }`
                                        }, style)
                                    )
                                ),
                                h('h3', { className: "text-xl font-bold text-brand-black mb-4" }, 'Choose Season'),
                                h('div', { className: "grid grid-cols-2 gap-2 mb-6" },
                                    ...seasons.map(season =>
                                        h('button', {
                                            key: season,
                                            onClick: () => setSelectedSeason(season),
                                            className: `py-3 px-4 rounded-lg font-medium transition-all ${
                                                selectedSeason === season
                                                    ? 'bg-brand-black text-white shadow-lg'
                                                    : 'bg-neutral-100 text-neutral-700 hover:bg-neutral-200'
                                            }`
                                        }, season)
                                    )
                                ),
                                h('button', {
                                    onClick: handleGenerateWithPreferences,
                                    disabled: !selectedStyle || !selectedSeason || loading,
                                    className: primaryBtn
                                },
                                    loading ? [h(LoaderIcon, { key: 'l' }), 'Improving…'] : [h(SparklesIcon, { key: 's' }), 'Improve the Look']
                                ),
                                h('button', {
                                    onClick: () => setShowStyleSelector(false),
                                    className: "w-full mt-3 bg-white border-2 border-brand-black text-brand-black py-3 rounded-xl font-semibold hover:bg-yellow-50 transition-all"
                                }, 'Cancel')
                            )
                        )
                    :
                        // Results
                        h('div', { className: "space-y-4" },
                            isRefinedSuggestion && h('div', { className: "bg-brand-black rounded-2xl shadow-lg p-6 text-white text-center" },
                                h('div', { className: "flex items-center justify-center gap-2 mb-2 text-brand-yellow" },
                                    h(SparklesIcon),
                                    h('h2', { className: "text-2xl font-bold text-white" }, 'Improved Look')
                                ),
                                h('p', { className: "text-lg" },
                                    h('span', { className: "text-brand-yellow font-semibold" }, selectedStyle),
                                    ' style for ',
                                    h('span', { className: "text-brand-yellow font-semibold" }, selectedSeason)
                                )
                            ),
                            error && h(ErrorBox, { message: error }),
                            h('div', { className: loading ? 'blur-content' : '' },
                                // Item description
                                h('div', { className: "bg-white rounded-2xl shadow-lg p-6 border border-neutral-100" },
                                    h('img', { src: image, alt: "Fashion item", className: "w-full h-48 object-contain bg-neutral-50 rounded-xl mb-4" }),
                                    h('h3', { className: "font-semibold text-brand-black mb-2" }, 'Your Item:'),
                                    h('p', { className: "text-neutral-600" }, suggestions.itemDescription || ''),
                                    h('div', { className: "flex flex-wrap gap-2 mt-3" },
                                        suggestions.styleCategory && h('span', { className: "px-3 py-1 bg-brand-black text-white rounded-full text-sm font-medium" }, suggestions.styleCategory),
                                        ...(suggestions.colorPalette || []).map((color, idx) =>
                                            h('span', { key: idx, className: "px-3 py-1 bg-yellow-100 text-brand-black rounded-full text-sm font-medium border border-yellow-200" }, color)
                                        )
                                    )
                                ),
                                // Outfit suggestions
                                ...(suggestions.outfitSuggestions || []).map((outfit, idx) =>
                                    h('div', { key: idx, className: "bg-white rounded-2xl shadow-lg p-6 border border-neutral-100" },
                                        h('h3', { className: "text-xl font-bold text-brand-black mb-2" }, outfit.name || `Look ${idx + 1}`),
                                        outfit.vibe && h('p', { className: "text-sm text-neutral-600 mb-4 italic" }, outfit.vibe),
                                        h('div', { className: "space-y-4" },
                                            h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, 'Tops:'),
                                                h('p', { className: "text-neutral-700" }, outfit.items?.tops || '—'),
                                                h(ShopButtons, { query: outfit.searchTerms?.tops, brands: shopBrands, lang: selectedLanguage })
                                            ),
                                            h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, 'Bottoms:'),
                                                h('p', { className: "text-neutral-700" }, outfit.items?.bottoms || '—'),
                                                h(ShopButtons, { query: outfit.searchTerms?.bottoms, brands: shopBrands, lang: selectedLanguage })
                                            ),
                                            h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, 'Accessories:'),
                                                h('p', { className: "text-neutral-700" }, outfit.items?.accessories || '—'),
                                                h(ShopButtons, { query: outfit.searchTerms?.accessories, brands: shopBrands, lang: selectedLanguage })
                                            )
                                        )
                                    )
                                ),
                                // Styling tips
                                (suggestions.tips || []).length > 0 && h('div', { className: "bg-white rounded-2xl shadow-lg p-6 border border-neutral-100" },
                                    h('h3', { className: "text-xl font-bold text-brand-black mb-4" }, '💡 Styling Tips'),
                                    h('ul', { className: "space-y-2" },
                                        ...(suggestions.tips || []).map((tip, idx) =>
                                            h('li', { key: idx, className: "flex gap-2 text-neutral-700" },
                                                h('span', { className: "text-brand-yellow font-bold" }, '•'),
                                                h('span', {}, tip)
                                            )
                                        )
                                    )
                                )
                            ),
                            loading && h('div', { className: "flex justify-center py-8" },
                                h('div', { className: "flex items-center gap-3 text-brand-black" },
                                    h(LoaderIcon),
                                    h('span', { className: "font-semibold" }, 'Improving your look…')
                                )
                            ),
                            !loading && h('button', { onClick: handleRefreshClick, className: primaryBtn },
                                h(RefreshIcon), 'Improve the Look'
                            ),
                            !loading && h('button', {
                                onClick: reset,
                                className: "w-full bg-white border-2 border-brand-black text-brand-black py-4 rounded-xl font-semibold hover:bg-neutral-50 transition-all"
                            }, 'Style Another Item')
                        )
                ),

                // Footer
                h('footer', { className: "w-full max-w-2xl mx-auto px-4 py-6 text-center text-xs text-neutral-400" },
                    'Yellow Shoes · styling suggestions are AI-generated · some links are affiliate links'
                )
            );
        }

        ReactDOM.render(h(FashionStylist), document.getElementById('app'));
    </script>
</body>
</html>
